<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torchlight Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Menu ──────────────────────────────────────────────── -->
  <div id="menu" class="screen">
    <h1>Darklight</h1>
    <p>a torchlight timer for Shadowdark</p>
    <button id="btn-torch" class="menu-btn">Light Torch</button>
    <button id="btn-staff" class="menu-btn">✦ Cast Light Spell</button>
  </div>

  <!-- ── Timer screen ──────────────────────────────────────── -->
  <div id="timer-screen" class="screen hidden">

    <!-- SVG filter for organic flame distortion -->
    <svg id="flame-filter" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="fl" x="-50%" y="-50%" width="200%" height="200%">
          <feTurbulence type="fractalNoise" baseFrequency="0.025 0.08" numOctaves="2" seed="3" result="noise">
            <animate attributeName="seed" values="0;20" dur="4s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <!-- Torch flame -->
    <div id="flame-container" class="state-igniting">
      <div class="flame-layer fl1"></div>
      <div class="flame-layer fl2"></div>
      <div class="flame-layer fl3"></div>
      <div class="torch-head"></div>
      <div class="torch-shaft"></div>
      <div class="embers">
        <div class="ember"></div>
        <div class="ember"></div>
        <div class="ember"></div>
      </div>
    </div>

    <!-- Staff glow -->
    <div id="glow-container" class="glow-state-igniting" style="display:none">
      <div class="staff-orb"></div>
    </div>

    <div id="mode-label">torch</div>
    <div id="time-display">60:00</div>

    <!-- Controls overlay (click anywhere outside to toggle) -->
    <div id="controls">
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-minus5">−5</button>
        <button class="ctrl-btn" id="btn-minus1">−1</button>
        <button class="ctrl-btn primary" id="btn-play">▶</button>
        <button class="ctrl-btn" id="btn-plus1">+1</button>
        <button class="ctrl-btn" id="btn-plus5">+5</button>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-stop">■ stop</button>
      </div>
    </div>

    <!-- Stop confirmation modal -->
    <div id="stop-confirm" class="hidden">
      <span>Extinguish the light?</span>
      <div class="confirm-row">
        <button class="ctrl-btn" id="btn-confirm-stop">Yes, extinguish</button>
        <button class="ctrl-btn" id="btn-cancel-stop">Cancel</button>
      </div>
    </div>

    <!-- Darkness fade after extinguish -->
    <div id="darkness"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
